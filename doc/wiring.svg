<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Courier New', monospace" font-size="13">

  <!-- Background -->
  <rect width="900" height="680" fill="#1a1a2e" rx="14"/>

  <!-- Title -->
  <text x="450" y="38" fill="#e94560" text-anchor="middle" font-size="17" font-weight="bold">ESP32-S3 Virtual CD-ROM — Hardware Wiring</text>
  <text x="450" y="58" fill="#a8a8b3" text-anchor="middle" font-size="12">SD_MMC 1-bit  ·  GPIO 10/11/12/13  ·  I2S Audio GPIO 14/15/16  ·  RGB LED GPIO 48</text>

  <!-- ── ESP32-S3 Module ─────────────────────────────────────────── -->
  <rect x="320" y="80" width="260" height="360" fill="#0f3460" rx="10" stroke="#e94560" stroke-width="2.5"/>
  <text x="450" y="107" fill="#e94560" text-anchor="middle" font-size="15" font-weight="bold">ESP32-S3</text>
  <text x="450" y="125" fill="#a8a8b3" text-anchor="middle" font-size="11">DevKitC-1  N16R8</text>

  <!-- Left-side GPIO pins (signal lines go left → SD module) -->
  <!-- Pin dots on left edge of ESP32 block -->
  <circle cx="320" cy="175" r="5" fill="#53d8fb"/>
  <circle cx="320" cy="210" r="5" fill="#53d8fb"/>
  <circle cx="320" cy="245" r="5" fill="#53d8fb"/>
  <circle cx="320" cy="280" r="5" fill="#53d8fb"/>
  <circle cx="320" cy="320" r="5" fill="#7ed321"/>
  <circle cx="320" cy="350" r="5" fill="#9b9b9b"/>
  <circle cx="320" cy="390" r="5" fill="#f5a623"/>

  <!-- GPIO labels inside ESP32 (right-aligned to left edge) -->
  <text x="330" y="179" fill="#53d8fb" font-size="12">GPIO 10  (CS / D3)</text>
  <text x="330" y="214" fill="#53d8fb" font-size="12">GPIO 11  (CMD)</text>
  <text x="330" y="249" fill="#53d8fb" font-size="12">GPIO 12  (CLK)</text>
  <text x="330" y="284" fill="#53d8fb" font-size="12">GPIO 13  (D0)</text>
  <text x="330" y="324" fill="#7ed321" font-size="12">3V3</text>
  <text x="330" y="354" fill="#9b9b9b" font-size="12">GND</text>
  <text x="330" y="394" fill="#f5a623" font-size="12">GPIO 48  (RGB)</text>

  <!-- Right-side I2S pins on ESP32 (go right → PCM5102 module) -->
  <circle cx="580" cy="310" r="5" fill="#e05cff"/>
  <circle cx="580" cy="340" r="5" fill="#e05cff"/>
  <circle cx="580" cy="370" r="5" fill="#e05cff"/>
  <text x="568" y="314" fill="#e05cff" text-anchor="end" font-size="12">GPIO 14  (BCK)</text>
  <text x="568" y="344" fill="#e05cff" text-anchor="end" font-size="12">GPIO 15  (WS)</text>
  <text x="568" y="374" fill="#e05cff" text-anchor="end" font-size="12">GPIO 16  (DIN)</text>

  <!-- Right-side USB connectors on ESP32 -->
  <!-- UART USB -->
  <rect x="578" y="155" width="66" height="36" fill="#16213e" rx="5" stroke="#e94560" stroke-width="1.8"/>
  <text x="611" y="170" fill="#e94560" text-anchor="middle" font-size="10" font-weight="bold">USB-C</text>
  <text x="611" y="184" fill="#a8a8b3" text-anchor="middle" font-size="10">UART / prog</text>
  <circle cx="578" cy="173" r="4" fill="#e94560"/>

  <!-- OTG USB -->
  <rect x="578" y="215" width="66" height="36" fill="#16213e" rx="5" stroke="#7ed321" stroke-width="1.8"/>
  <text x="611" y="230" fill="#7ed321" text-anchor="middle" font-size="10" font-weight="bold">USB-C</text>
  <text x="611" y="244" fill="#a8a8b3" text-anchor="middle" font-size="10">OTG  (CD-ROM)</text>
  <circle cx="578" cy="233" r="4" fill="#7ed321"/>

  <!-- ── SD Card Module ──────────────────────────────────────────── -->
  <rect x="50" y="130" width="195" height="240" fill="#0f3460" rx="10" stroke="#53d8fb" stroke-width="2"/>
  <text x="147" y="158" fill="#53d8fb" text-anchor="middle" font-size="14" font-weight="bold">SD Module</text>
  <text x="147" y="175" fill="#a8a8b3" text-anchor="middle" font-size="11">SPI / SD_MMC 1-bit</text>
  <text x="147" y="190" fill="#f5a623" text-anchor="middle" font-size="10">⚠ VCC = 3.3 V only</text>

  <!-- SD pin dots on right edge -->
  <circle cx="245" cy="218" r="5" fill="#53d8fb"/>
  <circle cx="245" cy="248" r="5" fill="#53d8fb"/>
  <circle cx="245" cy="278" r="5" fill="#53d8fb"/>
  <circle cx="245" cy="308" r="5" fill="#53d8fb"/>
  <circle cx="245" cy="338" r="5" fill="#7ed321"/>
  <circle cx="245" cy="368" r="5" fill="#9b9b9b"/>

  <!-- SD pin labels (right-aligned) -->
  <text x="235" y="222" fill="#e0e0e0" text-anchor="end" font-size="12">D4  (CS)</text>
  <text x="235" y="252" fill="#e0e0e0" text-anchor="end" font-size="12">D5  (CLK)</text>
  <text x="235" y="282" fill="#e0e0e0" text-anchor="end" font-size="12">D6  (MISO)</text>
  <text x="235" y="312" fill="#e0e0e0" text-anchor="end" font-size="12">D7  (MOSI)</text>
  <text x="235" y="342" fill="#7ed321" text-anchor="end" font-size="12">VCC</text>
  <text x="235" y="372" fill="#9b9b9b" text-anchor="end" font-size="12">GND</text>

  <!-- ── Wires SD → ESP32 ───────────────────────────────────────── -->
  <!-- CS   SD.D4  → GPIO10 -->
  <polyline points="245,218 283,218 283,175 320,175"
            fill="none" stroke="#53d8fb" stroke-width="2"/>
  <text x="264" y="213" fill="#53d8fb" font-size="10" text-anchor="middle">CS</text>

  <!-- CLK  SD.D5  → GPIO12 -->
  <polyline points="245,248 290,248 290,245 320,245"
            fill="none" stroke="#53d8fb" stroke-width="2"/>
  <text x="268" y="243" fill="#53d8fb" font-size="10" text-anchor="middle">CLK</text>

  <!-- MISO SD.D6  → GPIO13 -->
  <polyline points="245,278 297,278 297,280 320,280"
            fill="none" stroke="#53d8fb" stroke-width="2"/>
  <text x="272" y="273" fill="#53d8fb" font-size="10" text-anchor="middle">MISO</text>

  <!-- MOSI SD.D7  → GPIO11 -->
  <polyline points="245,308 275,308 275,210 320,210"
            fill="none" stroke="#53d8fb" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="259" y="303" fill="#53d8fb" font-size="10" text-anchor="middle">MOSI</text>

  <!-- VCC  SD.VCC → 3V3 -->
  <polyline points="245,338 305,338 305,320 320,320"
            fill="none" stroke="#7ed321" stroke-width="2"/>

  <!-- GND  SD.GND → GND -->
  <polyline points="245,368 312,368 312,350 320,350"
            fill="none" stroke="#9b9b9b" stroke-width="2"/>

  <!-- ── RGB LED ─────────────────────────────────────────────────── -->
  <circle cx="450" cy="498" r="28" fill="#f5a623" opacity="0.18" stroke="#f5a623" stroke-width="1.5"/>
  <circle cx="450" cy="498" r="13" fill="#f5a623" opacity="0.7"/>
  <text x="450" y="502" fill="#1a1a2e" text-anchor="middle" font-size="10" font-weight="bold">RGB</text>
  <text x="450" y="532" fill="#f5a623" text-anchor="middle" font-size="11">WS2812B  (onboard)</text>
  <!-- Wire from GPIO48 down to LED -->
  <line x1="320" y1="390" x2="280" y2="390" stroke="#f5a623" stroke-width="2"/>
  <polyline points="280,390 280,498 422,498" fill="none" stroke="#f5a623" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- ── GY-PCM5102 I2S Audio Module ────────────────────────────── -->
  <rect x="660" y="295" width="200" height="170" fill="#1a0030" rx="10" stroke="#e05cff" stroke-width="2"/>
  <text x="760" y="320" fill="#e05cff" text-anchor="middle" font-size="13" font-weight="bold">GY-PCM5102</text>
  <text x="760" y="337" fill="#a8a8b3" text-anchor="middle" font-size="10">I2S DAC  (optional)</text>

  <!-- PCM5102 pin dots on left edge -->
  <circle cx="660" cy="360" r="5" fill="#e05cff"/>
  <circle cx="660" cy="385" r="5" fill="#e05cff"/>
  <circle cx="660" cy="410" r="5" fill="#e05cff"/>
  <circle cx="660" cy="435" r="5" fill="#7ed321"/>
  <circle cx="660" cy="457" r="5" fill="#9b9b9b"/>

  <!-- PCM5102 pin labels -->
  <text x="672" y="364" fill="#e0e0e0" font-size="12">BCK</text>
  <text x="672" y="389" fill="#e0e0e0" font-size="12">LCK  (WS)</text>
  <text x="672" y="414" fill="#e0e0e0" font-size="12">DIN</text>
  <text x="672" y="439" fill="#7ed321" font-size="12">VIN  (3.3 V)</text>
  <text x="672" y="461" fill="#9b9b9b" font-size="12">GND</text>

  <!-- Line out label -->
  <text x="760" y="480" fill="#e05cff" text-anchor="middle" font-size="11">LINE OUT → mixer / amp</text>

  <!-- ── Wires ESP32 → PCM5102 ─────────────────────────────────── -->
  <!-- BCK  GPIO14 → PCM5102 BCK -->
  <line x1="580" y1="310" x2="660" y2="360" stroke="#e05cff" stroke-width="2"/>
  <!-- WS   GPIO15 → PCM5102 LCK -->
  <line x1="580" y1="340" x2="660" y2="385" stroke="#e05cff" stroke-width="2"/>
  <!-- DIN  GPIO16 → PCM5102 DIN -->
  <line x1="580" y1="370" x2="660" y2="410" stroke="#e05cff" stroke-width="2"/>
  <!-- 3V3 power -->
  <polyline points="320,320 310,320 310,600 640,600 640,435 660,435"
            fill="none" stroke="#7ed321" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- GND -->
  <polyline points="320,350 308,350 308,608 642,608 642,457 660,457"
            fill="none" stroke="#9b9b9b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── Host PC boxes --> ──────────────────────────────────────────── -->
  <!-- Serial PC -->
  <rect x="680" y="140" width="185" height="65" fill="#16213e" rx="7" stroke="#e94560" stroke-width="1.8"/>
  <text x="773" y="163" fill="#e94560" text-anchor="middle" font-size="13" font-weight="bold">Host PC</text>
  <text x="773" y="181" fill="#a8a8b3" text-anchor="middle" font-size="11">Serial monitor  115 200 bd</text>
  <text x="773" y="196" fill="#a8a8b3" text-anchor="middle" font-size="11">programming / CLI</text>

  <!-- Target PC -->
  <rect x="680" y="230" width="185" height="65" fill="#16213e" rx="7" stroke="#7ed321" stroke-width="1.8"/>
  <text x="773" y="253" fill="#7ed321" text-anchor="middle" font-size="13" font-weight="bold">Target PC</text>
  <text x="773" y="271" fill="#a8a8b3" text-anchor="middle" font-size="11">USB Mass Storage (CD-ROM)</text>
  <text x="773" y="286" fill="#a8a8b3" text-anchor="middle" font-size="11">no drivers required</text>

  <!-- Wires USB → PCs -->
  <line x1="644" y1="173" x2="680" y2="173" stroke="#e94560" stroke-width="2"/>
  <line x1="644" y1="233" x2="680" y2="263" stroke="#7ed321" stroke-width="2"/>

  <!-- USB labels on wires -->
  <text x="662" y="168" fill="#e94560" text-anchor="middle" font-size="10">USB</text>
  <text x="662" y="254" fill="#7ed321" text-anchor="middle" font-size="10">USB OTG</text>

  <!-- ── Legend ─────────────────────────────────────────────────── -->
  <rect x="50" y="420" width="220" height="130" fill="#16213e" rx="7" stroke="#444" stroke-width="1"/>
  <text x="160" y="440" fill="#a8a8b3" text-anchor="middle" font-size="11" font-weight="bold">Legend</text>
  <line x1="65" y1="455" x2="110" y2="455" stroke="#53d8fb" stroke-width="2"/>
  <text x="118" y="459" fill="#e0e0e0" font-size="11">SD_MMC data signals</text>
  <line x1="65" y1="472" x2="110" y2="472" stroke="#53d8fb" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="118" y="476" fill="#e0e0e0" font-size="11">SD_MMC MOSI (routed)</text>
  <line x1="65" y1="489" x2="110" y2="489" stroke="#7ed321" stroke-width="2"/>
  <text x="118" y="493" fill="#e0e0e0" font-size="11">3.3 V power</text>
  <line x1="65" y1="506" x2="110" y2="506" stroke="#9b9b9b" stroke-width="2"/>
  <text x="118" y="510" fill="#e0e0e0" font-size="11">GND</text>
  <line x1="65" y1="523" x2="110" y2="523" stroke="#f5a623" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="118" y="527" fill="#e0e0e0" font-size="11">GPIO 48 → RGB LED</text>
  <line x1="65" y1="540" x2="110" y2="540" stroke="#e05cff" stroke-width="2"/>
  <text x="118" y="544" fill="#e0e0e0" font-size="11">I2S audio (GPIO 14/15/16)</text>

  <!-- ── Note ───────────────────────────────────────────────────── -->
  <text x="450" y="570" fill="#f5a623" text-anchor="middle" font-size="11">⚠  SD module VCC must be 3.3 V — NOT 5 V</text>
  <text x="450" y="588" fill="#a8a8b3" text-anchor="middle" font-size="11">SD_MMC operates in 1-bit mode (4 wires) to avoid USB OTG pin conflicts</text>

</svg>
